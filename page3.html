<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Special Day</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:url("lavender-bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;
position:relative;

}

/* Floating Hearts */

.heart{

position:absolute;

bottom:-30px;

font-size:18px;

color:white;

animation:float 8s linear infinite;

opacity:.8;

}

@keyframes float{

0%{
transform:translateY(0);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* Calendar Card */

.calendar{

width:320px;

background:url("paper.png");

background-size:cover;

border-radius:25px;

padding:20px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.35);

position:relative;

animation:zoom 1s ease;

}

@keyframes zoom{

from{

transform:scale(.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}

/* Lace */

.lace{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

pointer-events:none;

}

/* Heading */

h2{

color:#8d63c8;

font-size:28px;

margin-bottom:20px;

}

/* Month */

.month{

background:#b78ad9;

color:white;

padding:10px;

border-radius:12px 12px 0 0;

font-size:22px;

font-weight:bold;

}

/* Date */

.date{

background:white;

padding:30px 0;

font-size:70px;

font-weight:bold;

color:#8d63c8;

border-radius:0 0 12px 12px;

}

.special{

margin-top:20px;

font-size:20px;

color:#555;

font-weight:bold;

}

.next{

margin-top:25px;

padding:12px 28px;

border:none;

border-radius:30px;

background:#b78ad9;

color:white;

font-size:18px;

font-weight:bold;

box-shadow:0 0 18px #d8b4ff;

cursor:pointer;

}

</style>
</head>

<body>

<div class="calendar">

<img src="lace.png" class="lace">

<h2>Our Special Day 💜</h2>

<div class="month">

JULY 2025

</div>

<div class="date">

13

</div>

<div class="special">

13-07-25 ✨

</div>

<button class="next" onclick="nextPage()">

Next ➜

</button>

</div>
  <script>

/* Floating Hearts */

for(let i=0;i<25;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="🤍";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(heart);

}

/* Floating Sparkles */

for(let i=0;i<35;i++){

let sparkle=document.createElement("div");

sparkle.style.position="absolute";
sparkle.style.width="4px";
sparkle.style.height="4px";
sparkle.style.background="white";
sparkle.style.borderRadius="50%";
sparkle.style.boxShadow="0 0 10px white";
sparkle.style.left=Math.random()*100+"%";
sparkle.style.top=Math.random()*100+"%";
sparkle.style.opacity=Math.random();

sparkle.animate([

{opacity:.2,transform:"scale(.5)"},
{opacity:1,transform:"scale(1.5)"},
{opacity:.2,transform:"scale(.5)"}

],{

duration:2000+Math.random()*2000,

iterations:Infinity

});

document.body.appendChild(sparkle);

}

/* Next Page */

function nextPage(){

document.body.style.transition="0.8s";
document.body.style.opacity="0";

setTimeout(function(){

window.location.href="page4.html";

},800);

}

</script>

</body>
</html>
