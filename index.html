<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:url("lavender-bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,sans-serif;

position:relative;

}

/* Floating Hearts */

.hearts{

position:absolute;
width:100%;
height:100%;
overflow:hidden;
pointer-events:none;

}

.heart{

position:absolute;
bottom:-40px;

color:#f6d7ff;

font-size:18px;

animation:float 8s linear infinite;

opacity:.8;

}

@keyframes float{

0%{

transform:translateY(0) scale(1);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh) scale(1.5);

opacity:0;

}

}

/* Sparkles */

.sparkle{

position:absolute;

width:4px;
height:4px;

background:white;

border-radius:50%;

box-shadow:
0 0 10px white,
0 0 20px white,
0 0 30px #d8b4ff;

animation:twinkle 2s infinite;

}

@keyframes twinkle{

0%,100%{

opacity:.2;

transform:scale(.5);

}

50%{

opacity:1;

transform:scale(1.5);

}

}

/* Main Card */

.card{

position:relative;

width:300px;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

animation:popup 1s ease;

}

@keyframes popup{

from{

transform:scale(.6);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

/* Lace */

.lace{

width:300px;

display:block;

}

/* Kitty */

.kitty{

position:absolute;

top:65px;

width:140px;

animation:floatkitty 3s ease-in-out infinite;

}

@keyframes floatkitty{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-10px);

}

}

/* Button */

button{

margin-top:25px;

background:#b78ad9;

color:white;

border:none;

padding:13px 28px;

border-radius:30px;

font-size:18px;

font-weight:bold;

box-shadow:

0 0 10px #d8b4ff,

0 0 25px #d8b4ff;

animation:glow 2s infinite;

cursor:pointer;

}

@keyframes glow{

0%,100%{

box-shadow:

0 0 10px #d8b4ff,

0 0 20px #d8b4ff;

}

50%{

box-shadow:

0 0 20px white,

0 0 40px #d8b4ff;

}

}

.small{

margin-top:8px;

font-size:14px;

color:white;

letter-spacing:1px;

}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="card">

<img src="lace.png" class="lace">

<img src="kitty.png" class="kitty">

<button onclick="openGift()">
SURPRISE 💜
</button>

<div class="small">
Tap To Open
</div>

  </div>
  <script>

const hearts=document.getElementById("hearts");

/* Floating Hearts */

for(let i=0;i<30;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="🤍";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(5+Math.random()*5)+"s";

heart.style.fontSize=(12+Math.random()*16)+"px";

heart.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(heart);

}

/* Sparkles */

for(let i=0;i<35;i++){

let s=document.createElement("div");

s.className="sparkle";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*2+"s";

document.body.appendChild(s);

}

/* Open Next Page */

function openGift(){

document.body.style.transition="1s";

document.body.style.opacity="0";

setTimeout(function(){

window.location.href="page2.html";

},900);

}

  </script>
  </body>
</html>
